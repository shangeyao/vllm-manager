version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vllm-manager-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - model-cache:/app/model_cache
    environment:
      - MODEL_CACHE_DIR=/app/model_cache
      - DATABASE_URL=sqlite:///app/data/vllm_manager.db
      - VLLM_PORT_RANGE_START=8001
      - VLLM_PORT_RANGE_END=8100
      - HOST=0.0.0.0
      - PORT=8000
    networks:
      - vllm-network
    restart: unless-stopped
    # GPU 支持（取消注释以启用）
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vllm-manager-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - vllm-network
    restart: unless-stopped

volumes:
  model-cache:
    driver: local

networks:
  vllm-network:
    driver: bridge
